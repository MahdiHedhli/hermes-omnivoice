# Example only. Keep the active default on xtts-v2 for unattended use; switch
# only for bounded manual operator trials.
#
# Required host-local environment:
#   OMNIVOICE_REMOTE_TRANSPORT=ssh-loopback
#   OMNIVOICE_REMOTE_SSH_HOST=hermes-ops@100.78.163.62
#   OMNIVOICE_REMOTE_SSH_IDENTITY_FILE=/home/claude/.ssh/hermes_ops_macstudio_ed25519
#   OMNIVOICE_REMOTE_HELPER=/Users/hermes-ops/Services/omnivoice/bin/omnivoice-remote-speech
#
# Optional manual pacing trial:
#   Set speed: 0.95 and add these command flags after --timeout 600:
#   --normalize-punctuation --sentence-breaks --max-sentence-chars 90
tts:
  provider: xtts-v2
  providers:
    omnivoice-remote-ssh-loopback:
      type: command
      command: "python3 /opt/hermes-local-tts/omnivoice-bridge/scripts/hermes-omnivoice-remote.py --transport ssh-loopback --ssh-host hermes-ops@100.78.163.62 --ssh-identity-file /home/claude/.ssh/hermes_ops_macstudio_ed25519 --remote-helper /Users/hermes-ops/Services/omnivoice/bin/omnivoice-remote-speech --remote-artifact-prefix /Users/hermes-ops/Services/omnivoice/ --voice {voice} --speed {speed} --text-file {input_path} --out {output_path} --max-chars 2000 --timeout 600"
      voice: homelab_narrator
      speed: 1.0
      output_format: wav
      timeout: 600
      voice_compatible: true
      max_text_length: 2000
