# Example only. Keep the active default on xtts-v2 until a bounded operator
# trial passes and rollback has been verified.
tts:
  provider: xtts-v2
  providers:
    omnivoice-remote:
      type: command
      command: "python /opt/hermes-local-tts/omnivoice-bridge/scripts/hermes-omnivoice-remote.py --voice {voice} --speed {speed} --text-file {input_path} --out {output_path} --max-chars 2000"
      voice: homelab_narrator
      speed: 1.0
      output_format: wav
      timeout: 600
      voice_compatible: true
      max_text_length: 2000
