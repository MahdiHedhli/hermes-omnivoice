# Example only. Add the provider first, run a smoke test, and switch the active
# provider after latency, quality, and local disk use are acceptable.
tts:
  provider: omnivoice
  providers:
    omnivoice:
      type: command
      command: "python /absolute/path/to/scripts/hermes-omnivoice-tts.py --voices-dir ~/.hermes/voices/omnivoice --voice {voice} --speed {speed} --max-chars 2000 --text-file {input_path} --out {output_path}"
      voice: narrator
      speed: 1.0
      output_format: wav
      timeout: 600
      voice_compatible: true
      max_text_length: 2000
